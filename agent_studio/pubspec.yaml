name: agent_studio
description: Interactive GUI for creating and managing AI agents — single agents, hierarchies, and groups.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.1
  web_socket_channel: ^2.4.4
  uuid: ^4.3.3
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  collection: ^1.18.0
  ffi: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
